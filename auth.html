<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyvex - Login / Sign Up</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Header / Navigation -->
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">N</div>
                <div class="logo-text">
                    <span class="logo-name">Nyvex</span>
                    <span class="logo-tagline">Mobile Auto Detailing</span>
                </div>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="#" class="nav-link">Services</a>
                <a href="#" class="nav-link">Booking</a>
                <a href="#" class="nav-link">Gallery</a>
                <a href="#" class="nav-link">About Us</a>
                <a href="#" class="nav-link">Contact</a>
            </nav>
            <div class="header-actions">
                <a href="index.html" class="icon-btn back-btn"><i class="fas fa-arrow-left"></i></a>
                <button class="icon-btn" id="themeBtn"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </header>

    <!-- Auth Section -->
    <section class="auth-section">
        <div class="auth-container">
            <!-- Tab Switcher -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">Log In</button>
                <button class="auth-tab" id="signupTab">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm">
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Log in to access your dashboard</p>

                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Log In</button>

                <div class="auth-divider">
                    <span>or continue with</span>
                </div>

                <div class="social-auth">
                    <button type="button" class="social-auth-btn"><i class="fab fa-google"></i></button>
                    <button type="button" class="social-auth-btn"><i class="fab fa-facebook-f"></i></button>
                    <button type="button" class="social-auth-btn"><i class="fab fa-apple"></i></button>
                </div>

                <p class="auth-switch">Don't have an account? <a href="#" id="goToSignup">Sign Up</a></p>
            </form>

            <!-- Sign Up Form -->
            <form class="auth-form" id="signupForm">
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Sign up to book your first service</p>

                <div class="form-row">
                    <div class="form-group">
                        <label for="signupFirst">First Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="signupFirst" placeholder="First name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="signupLast">Last Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="signupLast" placeholder="Last name" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupPhone">Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="signupPhone" placeholder="Enter your phone number" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="Create a password" required>
                        <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupConfirm">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupConfirm" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" required>
                        <span>I agree to the <a href="#">Terms & Conditions</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Create Account</button>

                <div class="auth-divider">
                    <span>or continue with</span>
                </div>

                <div class="social-auth">
                    <button type="button" class="social-auth-btn"><i class="fab fa-google"></i></button>
                    <button type="button" class="social-auth-btn"><i class="fab fa-facebook-f"></i></button>
                    <button type="button" class="social-auth-btn"><i class="fab fa-apple"></i></button>
                </div>

                <p class="auth-switch">Already have an account? <a href="#" id="goToLogin">Log In</a></p>
            </form>
        </div>
    </section>

    <script src="auth.js"></script>
</body>
</html>
