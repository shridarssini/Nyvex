<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23020817'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='bold' font-size='20' fill='%234FE3E3'%3EN%3C/text%3E%3C/svg%3E">`n    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyvex - Page Not Found</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .error-page::before {
            content: '';
            position: absolute;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
            opacity: 0.1;
            border-radius: 50%;
        }

        .error-content {
            position: relative;
            z-index: 1;
            max-width: 500px;
        }

        .error-code {
            font-size: 140px;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 0 40px var(--accent-glow);
            position: relative;
        }

        .error-code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 140px;
            font-weight: 800;
            color: var(--accent);
            opacity: 0.05;
            filter: blur(10px);
        }

        .error-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(79, 227, 227, 0.08);
            border: 2px solid rgba(79, 227, 227, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 32px;
            color: var(--accent);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .error-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .error-actions {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .error-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .error-links a {
            font-size: 13px;
            color: var(--text-secondary);
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .error-links a:hover {
            color: var(--accent);
        }

        .error-links i {
            font-size: 12px;
            color: var(--accent);
        }

        @media (max-width: 480px) {
            .error-code { font-size: 100px; }
            .error-code::after { font-size: 100px; }
            .error-title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <section class="error-page">
        <div class="error-content">
            <div class="error-icon"><i class="fas fa-car-crash"></i></div>
            <div class="error-code">404</div>
            <h1 class="error-title">Oops! Wrong Turn</h1>
            <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Home</a>
            </div>
            <div class="error-links">
                <a href="booking.html"><i class="fas fa-calendar"></i> Booking</a>
                <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
                <a href="faq.html"><i class="fas fa-question-circle"></i> FAQ</a>
                <a href="blog.html"><i class="fas fa-blog"></i> Blog</a>
            </div>
        </div>
    </section>

    <script>
        // Theme support
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.setAttribute('data-theme', 'light');
        }
    </script>
</body>
</html>
